app = "autoingest"
primary_region = "sin"

[build]

[env]
  AUTOINGEST_SERVER_PORT = "8080"
  AUTOINGEST_MONGO_URI = "mongodb://localhost:27017"
  AUTOINGEST_MONGO_DATABASE = "autoingest"
  AUTOINGEST_STORAGE_TYPE = "local"
  AUTOINGEST_STORAGE_LOCAL_DIR = "/data/uploads"
  AUTOINGEST_LLM_BASE_URL = ""
  AUTOINGEST_LLM_MODEL = ""

[[mounts]]
  source = "autoingest_data"
  destination = "/data"
  initial_size = 1

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1