app = "autoingest"
primary_region = "sin"

[build]

[env]
  AUTOINGEST_PORT = "8080"
  AUTOINGEST_DB_PATH = "/data/history.db"
  AUTOINGEST_UPLOAD_DIR = "/data/uploads"
  AUTOINGEST_MAX_FILE_SIZE_MB = "50"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[mounts]
  source = "autoingest_data"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
