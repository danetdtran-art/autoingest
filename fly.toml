# fly.toml app configuration file generated for autoingest
# See https://fly.io/docs/reference/configuration/

app = 'autoingest'
primary_region = 'sin'

[build]

[env]
  AUTOINGEST_PORT = '8080'
  AUTOINGEST_DB_PATH = '/data/history.db'
  AUTOINGEST_UPLOAD_DIR = '/data/uploads'
  AUTOINGEST_MAX_FILE_SIZE_MB = '50'
  # set via fly secrets / fly config before deploy
  AUTOINGEST_LLM_BASE_URL = ''
  AUTOINGEST_LLM_MODEL = ''

[[mounts]]
  source = 'autoingest_data'
  destination = '/data'
  initial_size = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
