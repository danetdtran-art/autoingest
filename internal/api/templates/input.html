<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AutoIngest — Upload</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;510;590;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css"></head><body>
<div class="app">
  <div class="topbar">
    <a href="/input" class="topbar-logo"><span class="topbar-logo-mark">AI</span>AutoIngest</a>
    <div class="topbar-actions"><a href="/input" class="active">Upload</a><a href="/history">History</a></div>
  </div>

  <h1 class="page-title">Upload file <span>/ classify</span></h1>

  <div class="card">
    <form id="upload-form" enctype="multipart/form-data" style="margin:0">
      <div class="dropzone" id="drop-zone">
        <input type="file" name="file" id="file-input" required>
        <div class="dropzone-icon">📄</div>
        <div class="dropzone-label" id="dropzone-label">Drop file here or click to browse</div>
        <div class="dropzone-hint">CSV · XLSX · HTML · TXT · PDF — max 50 MB</div>
        <div class="dropzone-file" id="dropzone-file" style="display:none"></div>
      </div>
      <div class="progress-wrap" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div style="margin-top:16px"><button type="submit" class="btn btn-primary" id="submit-btn">Upload &amp; Classify</button></div>
    </form>

    <div class="toast" id="toast">
      <span class="toast-icon" id="toast-icon">✅</span>
      <div class="toast-body">
        <div class="toast-title" id="toast-title">Done</div>
        <div class="toast-hint" id="toast-hint"></div>
      </div>
    </div>
  </div>
</div>

<script>
const dz=document.getElementById('drop-zone'),fi=document.getElementById('file-input'),
      fm=document.getElementById('upload-form'),sb=document.getElementById('submit-btn'),
      pw=document.getElementById('progress-wrap'),pb=document.getElementById('progress-bar'),
      to=document.getElementById('toast'),ti=document.getElementById('toast-icon'),
      tt=document.getElementById('toast-title'),th=document.getElementById('toast-hint'),
      dl=document.getElementById('dropzone-label'),df=document.getElementById('dropzone-file');
fi.addEventListener('change',()=>{if(fi.files.length){dl.textContent=fi.files[0].name;df.style.display='none'}});
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');
  if(e.dataTransfer.files.length){fi.files=e.dataTransfer.files;dl.textContent=e.dataTransfer.files[0].name;df.style.display='none'}});
fm.addEventListener('submit',async e=>{
  e.preventDefault();const fd=new FormData(fm);
  sb.disabled=true;sb.textContent='Processing…';pw.classList.add('show');
  let p=0;const iv=setInterval(()=>{p=Math.min(p+Math.random()*10,90);pb.style.width=p+'%'},300);
  try{const r=await fetch('/api/ingest',{method:'POST',body:fd});clearInterval(iv);
    const d=await r.json();
    ti.textContent=d.error?'❌':'✅';
    tt.textContent=d.error?'Error':d.metric_type;
    th.innerHTML=d.error?'<span>'+d.error+'</span>':'confidence '+Math.round(d.confidence*100)+'% · <a href="/result/'+d.job_id+'">View detail →</a>';
    to.classList.add('show');
  }catch(e){clearInterval(iv);ti.textContent='❌';tt.textContent='Error';th.textContent=e.message;to.classList.add('show')}
  sb.disabled=false;sb.textContent='Upload & Classify';pw.classList.remove('show');
});
</script>
</body></html>
